name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests and verify coverage thresholds
        run: mvn verify

      - name: Post coverage summary to PR
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: budinv-model/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Test Coverage Report
          min-coverage-overall: 50
          min-coverage-changed-files: 50

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: budinv-model/target/site/jacoco/
          retention-days: 30

  android:
    name: Android Build & Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Run unit tests
        working-directory: budinv-android
        run: ./gradlew test

      - name: Build debug APK
        working-directory: budinv-android
        run: ./gradlew assembleDebug

      - name: Upload APK
        id: upload-apk
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: budinv-android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Post APK link to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '📦 Debug APK ready: [Download app-debug.apk](${{ steps.upload-apk.outputs.artifact-url }})'
            });
